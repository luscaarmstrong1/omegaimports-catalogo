name: Sync Mercado Livre

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-mercadolivre
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      MELI_SYNC_SERVICE_URL: ${{ secrets.MELI_SYNC_SERVICE_URL }}
      MELI_SYNC_API_KEY: ${{ secrets.MELI_SYNC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Fetch sanitized snapshot
        run: pnpm run sync:meli

      - name: Build product database
        run: pnpm run products:build

      - name: Product report
        run: pnpm run products:report

      - name: Audit products
        run: pnpm run audit:products

      - name: Audit owned items
        run: pnpm run audit:owned-items

      - name: Audit catalog listings
        run: pnpm run audit:catalog-listings

      - name: Audit images
        run: pnpm run audit:images

      - name: Audit specifications
        run: pnpm run audit:specifications

      - name: Audit encoding
        run: pnpm run audit:encoding

      - name: Audit links
        run: pnpm run audit:links

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Audit dist images
        run: pnpm run audit:dist-images

      - name: Audit copy
        run: pnpm run audit:copy

      - name: Audit SEO
        run: pnpm run audit:seo

      - name: Audit Blog
        run: pnpm run audit:blog

      - name: Static E2E
        run: pnpm run test:e2e

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "Sem alteracoes para PR."
            exit 0
          fi
          branch="chore/sync-mercadolivre-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add src/data public/products reports || true
          git commit -m "chore: sync Mercado Livre catalog"
          git push origin "$branch"
          if ! gh pr create --base main --head "$branch" --title "chore: sync Mercado Livre catalog" --body "Sincronizacao via snapshot sanitizado do servico privado. Nao mesclar quando houver divergencias criticas nos relatorios."; then
            echo "GitHub Actions nao pode criar PR neste repositorio. Branch publicado: $branch"
            echo "Abra manualmente: https://github.com/${{ github.repository }}/pull/new/$branch"
          fi
