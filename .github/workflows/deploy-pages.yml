name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build product database
        run: pnpm run products:build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Audit products
        run: pnpm run audit:products

      - name: Audit images
        run: pnpm run audit:images

      - name: Audit encoding
        run: pnpm run audit:encoding

      - name: Audit links
        run: pnpm run audit:links

      - name: Audit specifications
        run: pnpm run audit:specifications

      - name: Audit marketplace
        run: pnpm run audit:marketplace

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Static E2E
        run: pnpm run test:e2e

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
